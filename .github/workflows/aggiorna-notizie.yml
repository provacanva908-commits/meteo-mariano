name: Aggiorna notizie sportive

on:
  workflow_dispatch:

  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

jobs:
  aggiorna:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica repository
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Crea feed sportivo
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          python <<'PY'
          import json
          import html
          import re
          import os
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET

          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo

          ITALY_TZ = ZoneInfo("Europe/Rome")
          now_italy = datetime.now(ITALY_TZ)
          today = now_italy.date()

          token = os.environ.get("FOOTBALL_DATA_TOKEN", "").strip()

          if not token:
              raise RuntimeError("FOOTBALL_DATA_TOKEN mancante")

          headers = {
              "User-Agent": "Mariano-Sports-Arena-Signage/1.0"
          }

          blocked_phrases = [
              "guarda il video",
              "guarda che",
              "il video",
              "video:",
              "video -",
              "foto:",
              "le foto",
              "fotogallery",
              "gallery",
              "highlights",
              "virale",
              "sui social",
              "clicca qui",
              "da non perdere",
              "che colpo",
              "il colpo di",
              "spettacolare punto",
              "punto incredibile",
              "siparietto",
              "curiosità",
              "gossip",
              "partite del primo turno",
              "calendario completo",
              "ecco le partite"
          ]

          important_keywords = {
              "TENNIS": [
                  "risultato",
                  "torneo",
                  "atp",
                  "wta",
                  "slam",
                  "wimbledon",
                  "roland garros",
                  "us open",
                  "australian open",
                  "classifica",
                  "ranking",
                  "finale",
                  "semifinale",
                  "quarti",
                  "infortunio",
                  "vittoria",
                  "sconfitta",
                  "eliminato",
                  "qualificato",
                  "sinner"
              ],
              "PADEL": [
                  "risultato",
                  "torneo",
                  "premier padel",
                  "finale",
                  "semifinale",
                  "quarti",
                  "classifica",
                  "ranking",
                  "vittoria",
                  "sconfitta",
                  "eliminato",
                  "qualificato",
                  "open"
              ]
          }

          def clean_text(value):
              value = html.unescape(value or "")
              value = re.sub(r"\s+", " ", value)
              return value.strip()

          def is_blocked(title):
              normalized = title.lower()

              return any(
                  phrase in normalized
                  for phrase in blocked_phrases
              )

          def importance_score(title, category):
              normalized = title.lower()
              score = 0

              for keyword in important_keywords.get(category, []):
                  if keyword in normalized:
                      score += 2

              if any(
                  word in normalized
                  for word in [
                      "oggi",
                      "domani",
                      "ufficiale",
                      "programma",
                      "calendario",
                      "diretta"
                  ]
              ):
                  score += 1

              if any(
                  word in normalized
                  for word in [
                      "video",
                      "foto",
                      "social",
                      "curiosità",
                      "gossip"
                  ]
              ):
                  score -= 5

              return score

          def fetch_json(url, extra_headers=None):
              request_headers = dict(headers)

              if extra_headers:
                  request_headers.update(extra_headers)

              request = urllib.request.Request(
                  url,
                  headers=request_headers
              )

              with urllib.request.urlopen(
                  request,
                  timeout=30
              ) as response:
                  return json.loads(
                      response.read().decode("utf-8")
                  )

          def fetch_world_cup_matches():
              date_string = today.isoformat()

              url = (
                  "https://api.football-data.org/v4/"
                  "competitions/WC/matches"
                  f"?dateFrom={date_string}"
                  f"&dateTo={date_string}"
              )

              data = fetch_json(
                  url,
                  {
                      "X-Auth-Token": token
                  }
              )

              matches = []

              for match in data.get("matches", []):
                  utc_date = match.get("utcDate")

                  if not utc_date:
                      continue

                  match_time = datetime.fromisoformat(
                      utc_date.replace("Z", "+00:00")
                  ).astimezone(ITALY_TZ)

                  home = (
                      match.get("homeTeam", {}).get("shortName")
                      or match.get("homeTeam", {}).get("name")
                      or "Squadra 1"
                  )

                  away = (
                      match.get("awayTeam", {}).get("shortName")
                      or match.get("awayTeam", {}).get("name")
                      or "Squadra 2"
                  )

                  status = match.get("status", "")
                  score = match.get("score", {}).get("fullTime", {})

                  home_score = score.get("home")
                  away_score = score.get("away")

                  if status == "FINISHED":
                      title = (
                          f"{home} {home_score}-{away_score} {away}"
                      )
                      detail = "Risultato finale"

                  elif status in [
                      "IN_PLAY",
                      "PAUSED"
                  ]:
                      title = (
                          f"{home} {home_score}-{away_score} {away}"
                      )
                      detail = "Partita in corso"

                  else:
                      title = (
                          f"{match_time.strftime('%H:%M')} "
                          f"{home} - {away}"
                      )
                      detail = "Mondiali: partita di oggi"

                  matches.append({
                      "category": "MONDIALI",
                      "title": title,
                      "source": "football-data.org",
                      "published": match_time.isoformat(),
                      "detail": detail
                  })

              return matches

          def fetch_google_news(category, query):
              encoded_query = urllib.parse.quote_plus(query)

              feed_url = (
                  "https://news.google.com/rss/search"
                  f"?q={encoded_query}"
                  "&hl=it"
                  "&gl=IT"
                  "&ceid=IT:it"
              )

              request = urllib.request.Request(
                  feed_url,
                  headers={
                      "User-Agent": (
                          "Mozilla/5.0 "
                          "(Windows NT 10.0; Win64; x64)"
                      )
                  }
              )

              with urllib.request.urlopen(
                  request,
                  timeout=30
              ) as response:
                  xml_data = response.read()

              root = ET.fromstring(xml_data)
              items = root.findall("./channel/item")

              results = []
              seen = set()

              for item in items:
                  title = clean_text(
                      item.findtext("title", "")
                  )

                  if not title:
                      continue

                  normalized = title.lower()

                  if normalized in seen:
                      continue

                  if is_blocked(title):
                      continue

                  score = importance_score(
                      title,
                      category
                  )

                  if score < 1:
                      continue

                  source_element = item.find("source")

                  source = (
                      clean_text(source_element.text)
                      if source_element is not None
                      and source_element.text
                      else "Google News"
                  )

                  published = clean_text(
                      item.findtext("pubDate", "")
                  )

                  results.append({
                      "category": category,
                      "title": title,
                      "source": source,
                      "published": published,
                      "_score": score
                  })

                  seen.add(normalized)

              results.sort(
                  key=lambda item: item["_score"],
                  reverse=True
              )

              for result in results:
                  result.pop("_score", None)

              return results[:4]

          articles = []

          try:
              world_cup_matches = fetch_world_cup_matches()

              if world_cup_matches:
                  articles.extend(world_cup_matches)
              else:
                  articles.append({
                      "category": "MONDIALI",
                      "title": (
                          "Nessuna partita dei Mondiali "
                          "in programma oggi"
                      ),
                      "source": "football-data.org",
                      "published": now_italy.isoformat()
                  })

          except Exception as error:
              print(
                  "Errore recupero Mondiali:",
                  error
              )

              articles.append({
                  "category": "MONDIALI",
                  "title": (
                      "Calendario Mondiali "
                      "momentaneamente non disponibile"
                  ),
                  "source": "football-data.org",
                  "published": now_italy.isoformat()
              })

          try:
              articles.extend(
                  fetch_google_news(
                      "TENNIS",
                      'tennis OR ATP OR WTA OR Sinner'
                  )
              )

          except Exception as error:
              print("Errore tennis:", error)

          try:
              articles.extend(
                  fetch_google_news(
                      "PADEL",
                      'padel OR "Premier Padel"'
                  )
              )

          except Exception as error:
              print("Errore padel:", error)

          output = {
              "updated_at": datetime.now(
                  timezone.utc
              ).isoformat(),
              "articles": articles
          }

          with open(
              "news.json",
              "w",
              encoding="utf-8"
          ) as file:
              json.dump(
                  output,
                  file,
                  ensure_ascii=False,
                  indent=2
              )

          print(
              f"Salvate {len(articles)} notizie"
          )
          PY

      - name: Salva news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add news.json

          if git diff --cached --quiet; then
            echo "Nessuna modifica"
          else
            git commit -m "Aggiorna Mondiali, tennis e padel"
            git push
          fi
