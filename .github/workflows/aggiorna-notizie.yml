name: Aggiorna notizie sportive

on:
  workflow_dispatch:

  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

jobs:
  aggiorna:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica repository
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scarica le notizie
        run: |
          python <<'PY'
          import json
          import html
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone

          searches = [
              {
                  "category": "CALCIO",
                  "query": 'calcio OR "Serie A" OR Champions League'
              },
              {
                  "category": "TENNIS",
                  "query": 'tennis OR ATP OR WTA OR Sinner'
              },
              {
                  "category": "PADEL",
                  "query": 'padel OR "Premier Padel"'
              }
          ]

          headers = {
              "User-Agent": (
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                  "AppleWebKit/537.36 Chrome/125 Safari/537.36"
              )
          }

          articles = []
          seen_titles = set()

          for search in searches:
              encoded_query = urllib.parse.quote_plus(search["query"])

              feed_url = (
                  "https://news.google.com/rss/search"
                  f"?q={encoded_query}"
                  "&hl=it"
                  "&gl=IT"
                  "&ceid=IT:it"
              )

              try:
                  request = urllib.request.Request(
                      feed_url,
                      headers=headers
                  )

                  with urllib.request.urlopen(
                      request,
                      timeout=30
                  ) as response:
                      xml_data = response.read()

                  root = ET.fromstring(xml_data)
                  items = root.findall("./channel/item")

                  count = 0

                  for item in items:
                      if count >= 6:
                          break

                      title = html.unescape(
                          item.findtext("title", "").strip()
                      )

                      link = item.findtext("link", "").strip()
                      published = item.findtext(
                          "pubDate",
                          ""
                      ).strip()

                      source_element = item.find("source")

                      source = (
                          source_element.text.strip()
                          if source_element is not None
                          and source_element.text
                          else "Google News"
                      )

                      if not title or title in seen_titles:
                          continue

                      seen_titles.add(title)

                      articles.append({
                          "category": search["category"],
                          "title": title,
                          "source": source,
                          "link": link,
                          "published": published
                      })

                      count += 1

              except Exception as error:
                  print(
                      f"Errore categoria "
                      f"{search['category']}: {error}"
                  )

          output = {
              "updated_at": datetime.now(
                  timezone.utc
              ).isoformat(),
              "articles": articles
          }

          with open(
              "news.json",
              "w",
              encoding="utf-8"
          ) as file:
              json.dump(
                  output,
                  file,
                  ensure_ascii=False,
                  indent=2
              )

          print(
              f"Salvate {len(articles)} notizie"
          )
          PY

      - name: Salva news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add news.json

          if git diff --cached --quiet; then
            echo "Nessuna modifica"
          else
            git commit -m "Aggiornamento automatico notizie sportive"
            git push
          fi
