name: Aggiorna notizie sportive

on:
  workflow_dispatch:

  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

jobs:
  aggiorna:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica repository
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scarica e filtra le notizie
        run: |
          python <<'PY'
          import json
          import html
          import re
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone

          searches = [
              {
                  "category": "CALCIO",
                  "query": 'calcio OR "Serie A" OR Champions League'
              },
              {
                  "category": "TENNIS",
                  "query": 'tennis OR ATP OR WTA OR Sinner'
              },
              {
                  "category": "PADEL",
                  "query": 'padel OR "Premier Padel"'
              }
          ]

          blocked_phrases = [
              "guarda il video",
              "guarda che",
              "il video",
              "video:",
              "video -",
              "foto:",
              "le foto",
              "fotogallery",
              "gallery",
              "highlights",
              "virale",
              "sui social",
              "impazza sui social",
              "clicca qui",
              "da non perdere",
              "che colpo",
              "il colpo di",
              "spettacolare punto",
              "punto incredibile",
              "siparietto",
              "curiosità",
              "gossip",
              "retroscena social"
          ]

          important_keywords = {
              "CALCIO": [
                  "risultato",
                  "classifica",
                  "partita",
                  "campionato",
                  "serie a",
                  "champions",
                  "europa league",
                  "coppa",
                  "mercato",
                  "calciomercato",
                  "trasferimento",
                  "acquisto",
                  "cessione",
                  "infortunio",
                  "convocati",
                  "allenatore",
                  "gol",
                  "vittoria",
                  "sconfitta",
                  "pareggio"
              ],

              "TENNIS": [
                  "risultato",
                  "torneo",
                  "atp",
                  "wta",
                  "slam",
                  "wimbledon",
                  "roland garros",
                  "us open",
                  "australian open",
                  "classifica",
                  "ranking",
                  "finale",
                  "semifinale",
                  "quarti",
                  "infortunio",
                  "vittoria",
                  "sconfitta",
                  "eliminato",
                  "qualificato"
              ],

              "PADEL": [
                  "risultato",
                  "torneo",
                  "premier padel",
                  "finale",
                  "semifinale",
                  "quarti",
                  "classifica",
                  "ranking",
                  "vittoria",
                  "sconfitta",
                  "eliminato",
                  "qualificato",
                  "campionato",
                  "open"
              ]
          }

          headers = {
              "User-Agent": (
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                  "AppleWebKit/537.36 Chrome/125 Safari/537.36"
              )
          }

          def clean_text(value):
              value = html.unescape(value or "")
              value = re.sub(r"\s+", " ", value)
              return value.strip()

          def is_blocked(title):
              normalized = title.lower()

              return any(
                  phrase in normalized
                  for phrase in blocked_phrases
              )

          def importance_score(title, category):
              normalized = title.lower()
              score = 0

              for keyword in important_keywords.get(category, []):
                  if keyword in normalized:
                      score += 2

              if any(
                  word in normalized
                  for word in [
                      "oggi",
                      "domani",
                      "ufficiale",
                      "diretta",
                      "programma",
                      "calendario"
                  ]
              ):
                  score += 1

              if any(
                  word in normalized
                  for word in [
                      "video",
                      "foto",
                      "social",
                      "curiosità",
                      "gossip"
                  ]
              ):
                  score -= 5

              return score

          all_articles = []
          seen_titles = set()

          for search in searches:
              encoded_query = urllib.parse.quote_plus(
                  search["query"]
              )

              feed_url = (
                  "https://news.google.com/rss/search"
                  f"?q={encoded_query}"
                  "&hl=it"
                  "&gl=IT"
                  "&ceid=IT:it"
              )

              try:
                  request = urllib.request.Request(
                      feed_url,
                      headers=headers
                  )

                  with urllib.request.urlopen(
                      request,
                      timeout=30
                  ) as response:
                      xml_data = response.read()

                  root = ET.fromstring(xml_data)
                  items = root.findall("./channel/item")

                  category_articles = []

                  for item in items:
                      title = clean_text(
                          item.findtext("title", "")
                      )

                      link = clean_text(
                          item.findtext("link", "")
                      )

                      published = clean_text(
                          item.findtext("pubDate", "")
                      )

                      source_element = item.find("source")

                      source = (
                          clean_text(source_element.text)
                          if source_element is not None
                          and source_element.text
                          else "Google News"
                      )

                      normalized_title = title.lower()

                      if not title:
                          continue

                      if normalized_title in seen_titles:
                          continue

                      if is_blocked(title):
                          print(
                              "Esclusa notizia video/foto:",
                              title
                          )
                          continue

                      score = importance_score(
                          title,
                          search["category"]
                      )

                      if score < 1:
                          print(
                              "Esclusa notizia poco rilevante:",
                              title
                          )
                          continue

                      seen_titles.add(normalized_title)

                      category_articles.append({
                          "category": search["category"],
                          "title": title,
                          "source": source,
                          "link": link,
                          "published": published,
                          "_score": score
                      })

                  category_articles.sort(
                      key=lambda article: article["_score"],
                      reverse=True
                  )

                  for article in category_articles[:4]:
                      article.pop("_score", None)
                      all_articles.append(article)

              except Exception as error:
                  print(
                      f"Errore categoria "
                      f"{search['category']}: {error}"
                  )

          output = {
              "updated_at": datetime.now(
                  timezone.utc
              ).isoformat(),
              "articles": all_articles
          }

          with open(
              "news.json",
              "w",
              encoding="utf-8"
          ) as file:
              json.dump(
                  output,
                  file,
                  ensure_ascii=False,
                  indent=2
              )

          print(
              f"Salvate {len(all_articles)} "
              "notizie sportive filtrate"
          )
          PY

      - name: Salva news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add news.json

          if git diff --cached --quiet; then
            echo "Nessuna modifica"
          else
            git commit -m "Aggiornamento notizie sportive filtrate"
            git push
          fi
