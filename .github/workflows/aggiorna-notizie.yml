name: Aggiorna notizie sportive

on:
  workflow_dispatch:

  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  aggiorna:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica repository
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Crea feed sportivo
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}

        run: |
          python <<'PY'
          import html
          import json
          import os
          import re
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET

          from datetime import datetime, timedelta, timezone
          from zoneinfo import ZoneInfo


          ITALY_TZ = ZoneInfo("Europe/Rome")

          now_italy = datetime.now(ITALY_TZ)
          today_italy = now_italy.date()

          token = os.environ.get(
              "FOOTBALL_DATA_TOKEN",
              ""
          ).strip()

          if not token:
              raise RuntimeError(
                  "FOOTBALL_DATA_TOKEN mancante"
              )


          blocked_phrases = [
              "guarda il video",
              "guarda che",
              "il video",
              "video:",
              "video -",
              "foto:",
              "le foto",
              "fotogallery",
              "gallery",
              "highlights",
              "virale",
              "sui social",
              "clicca qui",
              "da non perdere",
              "che colpo",
              "il colpo di",
              "spettacolare punto",
              "punto incredibile",
              "siparietto",
              "curiosità",
              "gossip",
              "retroscena social",
              "partite del primo turno",
              "calendario completo",
              "ecco le partite"
          ]


          important_keywords = {
              "TENNIS": [
                  "risultato",
                  "torneo",
                  "atp",
                  "wta",
                  "slam",
                  "wimbledon",
                  "roland garros",
                  "us open",
                  "australian open",
                  "classifica",
                  "ranking",
                  "finale",
                  "semifinale",
                  "quarti",
                  "infortunio",
                  "vittoria",
                  "sconfitta",
                  "eliminato",
                  "qualificato",
                  "sinner"
              ],

              "PADEL": [
                  "risultato",
                  "torneo",
                  "premier padel",
                  "finale",
                  "semifinale",
                  "quarti",
                  "classifica",
                  "ranking",
                  "vittoria",
                  "sconfitta",
                  "eliminato",
                  "qualificato",
                  "campionato",
                  "open"
              ]
          }


          def clean_text(value):
              value = html.unescape(value or "")
              value = re.sub(r"\s+", " ", value)

              return value.strip()


          def is_blocked(title):
              normalized = title.lower()

              return any(
                  phrase in normalized
                  for phrase in blocked_phrases
              )


          def importance_score(title, category):
              normalized = title.lower()
              score = 0

              for keyword in important_keywords.get(
                  category,
                  []
              ):
                  if keyword in normalized:
                      score += 2

              if any(
                  word in normalized
                  for word in [
                      "oggi",
                      "domani",
                      "ufficiale",
                      "programma",
                      "diretta"
                  ]
              ):
                  score += 1

              if any(
                  word in normalized
                  for word in [
                      "video",
                      "foto",
                      "social",
                      "curiosità",
                      "gossip"
                  ]
              ):
                  score -= 6

              return score


          def fetch_json(url, headers):
              request = urllib.request.Request(
                  url,
                  headers=headers
              )

              with urllib.request.urlopen(
                  request,
                  timeout=30
              ) as response:
                  return json.loads(
                      response.read().decode("utf-8")
                  )


          def team_name(team):
              return (
                  team.get("shortName")
                  or team.get("tla")
                  or team.get("name")
                  or "Da definire"
              )


          def fetch_world_cup_matches():
              # Cerca il giorno precedente e quello successivo,
              # poi mantiene solo le partite che in Italia
              # cadono effettivamente nella giornata di oggi.

              date_from = (
                  today_italy - timedelta(days=1)
              ).isoformat()

              date_to = (
                  today_italy + timedelta(days=1)
              ).isoformat()

              url = (
                  "https://api.football-data.org/v4/"
                  "competitions/WC/matches"
                  f"?dateFrom={date_from}"
                  f"&dateTo={date_to}"
              )

              data = fetch_json(
                  url,
                  {
                      "X-Auth-Token": token,
                      "User-Agent":
                          "Mariano-Sports-Arena/1.0"
                  }
              )

              matches = []

              for match in data.get("matches", []):
                  utc_date = match.get("utcDate")

                  if not utc_date:
                      continue

                  match_time = datetime.fromisoformat(
                      utc_date.replace(
                          "Z",
                          "+00:00"
                      )
                  ).astimezone(ITALY_TZ)

                  # Esclude gli incontri che, secondo l'ora italiana,
                  # cadono nel giorno precedente o successivo.

                  if match_time.date() != today_italy:
                      continue

                  home = team_name(
                      match.get("homeTeam", {})
                  )

                  away = team_name(
                      match.get("awayTeam", {})
                  )

                  status = match.get(
                      "status",
                      "SCHEDULED"
                  )

                  score_data = (
                      match.get("score", {})
                      .get("fullTime", {})
                  )

                  home_score = score_data.get("home")
                  away_score = score_data.get("away")

                  matches.append({
                      "type": "match",
                      "category": "MONDIALI",
                      "home": home,
                      "away": away,
                      "time": match_time.strftime("%H:%M"),
                      "date": match_time.isoformat(),
                      "status": status,
                      "home_score": home_score,
                      "away_score": away_score,
                      "group": (
                          match.get("group")
                          or match.get("stage")
                          or ""
                      )
                  })

              matches.sort(
                  key=lambda item: item["date"]
              )

              return matches


          def fetch_google_news(category, query):
              encoded_query = urllib.parse.quote_plus(
                  query
              )

              feed_url = (
                  "https://news.google.com/rss/search"
                  f"?q={encoded_query}"
                  "&hl=it"
                  "&gl=IT"
                  "&ceid=IT:it"
              )

              request = urllib.request.Request(
                  feed_url,
                  headers={
                      "User-Agent":
                          "Mozilla/5.0 "
                          "(Windows NT 10.0; Win64; x64)"
                  }
              )

              with urllib.request.urlopen(
                  request,
                  timeout=30
              ) as response:
                  xml_data = response.read()

              root = ET.fromstring(xml_data)

              results = []
              seen = set()

              for item in root.findall(
                  "./channel/item"
              ):
                  title = clean_text(
                      item.findtext("title", "")
                  )

                  if not title:
                      continue

                  normalized = title.lower()

                  if normalized in seen:
                      continue

                  if is_blocked(title):
                      continue

                  score = importance_score(
                      title,
                      category
                  )

                  if score < 1:
                      continue

                  source_element = item.find("source")

                  source = (
                      clean_text(source_element.text)
                      if source_element is not None
                      and source_element.text
                      else "Google News"
                  )

                  published = clean_text(
                      item.findtext(
                          "pubDate",
                          ""
                      )
                  )

                  results.append({
                      "type": "news",
                      "category": category,
                      "title": title,
                      "source": source,
                      "published": published,
                      "_score": score
                  })

                  seen.add(normalized)

              results.sort(
                  key=lambda item: item["_score"],
                  reverse=True
              )

              selected = results[:4]

              for result in selected:
                  result.pop("_score", None)

              return selected


          articles = []


          try:
              matches = fetch_world_cup_matches()

              if matches:
                  articles.extend(matches)

              else:
                  articles.append({
                      "type": "message",
                      "category": "MONDIALI",
                      "title": (
                          "Nessuna partita dei Mondiali "
                          "in programma oggi"
                      ),
                      "source": "football-data.org"
                  })

          except Exception as error:
              print(
                  "Errore recupero Mondiali:",
                  error
              )

              articles.append({
                  "type": "message",
                  "category": "MONDIALI",
                  "title": (
                      "Calendario dei Mondiali "
                      "momentaneamente non disponibile"
                  ),
                  "source": "football-data.org"
              })


          try:
              articles.extend(
                  fetch_google_news(
                      "TENNIS",
                      (
                          'tennis OR ATP OR WTA '
                          'OR Sinner'
                      )
                  )
              )

          except Exception as error:
              print(
                  "Errore recupero tennis:",
                  error
              )


          try:
              articles.extend(
                  fetch_google_news(
                      "PADEL",
                      (
                          'padel OR "Premier Padel"'
                      )
                  )
              )

          except Exception as error:
              print(
                  "Errore recupero padel:",
                  error
              )


          output = {
              "updated_at": datetime.now(
                  timezone.utc
              ).isoformat(),

              "local_date": today_italy.isoformat(),

              "articles": articles
          }


          with open(
              "news.json",
              "w",
              encoding="utf-8"
          ) as file:
              json.dump(
                  output,
                  file,
                  ensure_ascii=False,
                  indent=2
              )


          print(
              f"Salvati {len(articles)} elementi"
          )
          PY

      - name: Salva news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add news.json

          if git diff --cached --quiet; then
            echo "Nessuna modifica"
          else
            git commit -m "Aggiorna partite e notizie sportive"
            git push
            fi
