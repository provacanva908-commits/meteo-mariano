<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #07111f;
      color: #ffffff;
    }

    body {
      background:
        radial-gradient(
          circle at 85% 50%,
          #174e78 0%,
          #0a2947 38%,
          #061321 78%
        );
    }

    .page {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      overflow: hidden;
    }

    .brand {
      width: 220px;
      min-width: 220px;
      height: 100%;
      padding: 10px 15px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: rgba(0, 0, 0, 0.25);
      border-right: 1px solid rgba(255, 255, 255, 0.17);
    }

    .brand img {
      display: block;
      max-width: 140px;
      max-height: 72px;
      width: auto;
      height: auto;
      object-fit: contain;
      margin-bottom: 7px;
      filter: drop-shadow(
        0 4px 8px rgba(0, 0, 0, 0.35)
      );
    }

    .brand-title {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 1.3px;
    }

    .brand-title span {
      color: #ff3b30;
    }

    .brand-subtitle {
      margin-top: 5px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      opacity: 0.7;
    }

    .content {
      position: relative;
      flex: 1;
      min-width: 0;
      height: 100%;
      padding: 12px 28px 17px;
      display: flex;
      align-items: center;
    }

    .slide {
      width: 100%;
      opacity: 1;
      transform: translateY(0);
      transition:
        opacity 0.35s ease,
        transform 0.35s ease;
    }

    .slide-hidden {
      opacity: 0;
      transform: translateY(8px);
    }

    .top-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
    }

    .category {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 1px;
      color: #ffffff;
      background: linear-gradient(
        135deg,
        #e53935,
        #a81010
      );
    }

    .category-tennis {
      color: #12210d;
      background: linear-gradient(
        135deg,
        #dce85f,
        #79ae3b
      );
    }

    .category-padel {
      color: #ffffff;
      background: linear-gradient(
        135deg,
        #2db9f4,
        #1557b5
      );
    }

    .live-dot {
      width: 8px;
      min-width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff3b30;
      box-shadow:
        0 0 0 4px rgba(255, 59, 48, 0.15);
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      opacity: 0.75;
    }

    .headline {
      max-width: 100%;
      font-size: 30px;
      font-weight: 800;
      line-height: 1.16;
      white-space: normal;
      overflow-wrap: break-word;
      text-shadow:
        0 3px 10px rgba(0, 0, 0, 0.48);
    }

    .source {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.72;
    }

    .matches-title {
      margin-bottom: 10px;
      font-size: 23px;
      font-weight: 900;
      letter-spacing: 0.3px;
    }

    .matches-grid {
      width: 100%;
      display: grid;
      grid-template-columns:
        repeat(2, minmax(0, 1fr));
      gap: 8px 14px;
    }

    .match {
      min-width: 0;
      min-height: 62px;
      padding: 9px 13px;
      display: grid;
      grid-template-columns: 65px 1fr;
      align-items: center;
      gap: 10px;
      border-radius: 11px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(0, 0, 0, 0.25);
    }

    .match-time {
      font-size: 19px;
      font-weight: 900;
      color: #ffd84a;
      text-align: center;
    }

    .match-teams {
      min-width: 0;
    }

    .teams {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.15;
    }

    .match-info {
      margin-top: 4px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.68;
    }

    .final-score {
      font-size: 20px;
      color: #ffffff;
    }

    .counter {
      position: absolute;
      top: 10px;
      right: 18px;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      font-size: 10px;
      opacity: 0.75;
    }

    .updated {
      position: absolute;
      right: 20px;
      bottom: 8px;
      font-size: 9px;
      opacity: 0.55;
    }

    .progress {
      position: absolute;
      left: 220px;
      right: 0;
      bottom: 0;
      height: 5px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.1);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(
        90deg,
        #ff3b30,
        #ffd428
      );
    }

    .progress-animate {
      animation: progress 15s linear forwards;
    }

    @keyframes progress {
      from {
        width: 0%;
      }

      to {
        width: 100%;
      }
    }

    .error-message {
      width: 100%;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      opacity: 0.9;
    }

    @media (max-width: 1050px) {
      .brand {
        width: 170px;
        min-width: 170px;
      }

      .brand img {
        max-width: 105px;
        max-height: 55px;
      }

      .brand-title {
        font-size: 14px;
      }

      .content {
        padding: 8px 14px 12px;
      }

      .matches-title {
        margin-bottom: 6px;
        font-size: 17px;
      }

      .match {
        min-height: 48px;
        padding: 5px 8px;
        grid-template-columns: 52px 1fr;
      }

      .match-time {
        font-size: 14px;
      }

      .teams {
        font-size: 13px;
      }

      .headline {
        font-size: 22px;
        line-height: 1.12;
      }

      .progress {
        left: 170px;
        height: 4px;
      }
    }
  </style>
</head>

<body>

  <main class="page">

    <aside class="brand">

      <img
        src="logo-mariano.png"
        alt="Mariano Sports Arena"
        onerror="this.style.display='none'"
      >

      <div class="brand-title">
        SPORT <span>NEWS</span>
      </div>

      <div class="brand-subtitle">
        Mondiali · Tennis · Padel
      </div>

    </aside>

    <section class="content">

      <div
        class="counter"
        id="counter"
      ></div>

      <div
        class="slide"
        id="slide"
      >
        Caricamento contenuti...
      </div>

      <div
        class="updated"
        id="updated"
      ></div>

    </section>

    <div class="progress">
      <div
        class="progress-bar"
        id="progress-bar"
      ></div>
    </div>

  </main>

  <script>
    var slideElement =
      document.getElementById("slide");

    var counterElement =
      document.getElementById("counter");

    var updatedElement =
      document.getElementById("updated");

    var progressBar =
      document.getElementById("progress-bar");

    var slideDuration = 15000;

    var slides = [];
    var currentSlide = 0;
    var slideTimer = null;


    function escapeHtml(value) {
      if (
        value === null ||
        value === undefined
      ) {
        return "";
      }

      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }


    function restartProgress() {
      progressBar.className =
        "progress-bar";

      void progressBar.offsetWidth;

      progressBar.className =
        "progress-bar progress-animate";
    }


    function getCategoryClass(category) {
      var normalized =
        String(category || "").toLowerCase();

      if (normalized === "tennis") {
        return "category category-tennis";
      }

      if (normalized === "padel") {
        return "category category-padel";
      }

      return "category";
    }


    function formatGroup(value) {
      if (!value) {
        return "";
      }

      var text = String(value);

      text = text.replace(
        "GROUP_",
        "Girone "
      );

      text = text.replace(
        "LAST_16",
        "Ottavi di finale"
      );

      text = text.replace(
        "QUARTER_FINALS",
        "Quarti di finale"
      );

      text = text.replace(
        "SEMI_FINALS",
        "Semifinale"
      );

      text = text.replace(
        "FINAL",
        "Finale"
      );

      return text;
    }


    function getStatusText(match) {
      if (match.status === "FINISHED") {
        return "Risultato finale";
      }

      if (
        match.status === "IN_PLAY" ||
        match.status === "PAUSED"
      ) {
        return "Partita in corso";
      }

      if (match.group) {
        return formatGroup(match.group);
      }

      return "Partita di oggi";
    }


    function renderMatches(matches) {
      var rows = "";
      var i;

      for (i = 0; i < matches.length; i++) {
        var match = matches[i];

        var timeOrScore =
          escapeHtml(match.time);

        var hasScore =
          match.home_score !== null &&
          match.home_score !== undefined &&
          match.away_score !== null &&
          match.away_score !== undefined;

        if (
          (
            match.status === "FINISHED" ||
            match.status === "IN_PLAY" ||
            match.status === "PAUSED"
          ) &&
          hasScore
        ) {
          timeOrScore =
            '<span class="final-score">' +
            escapeHtml(match.home_score) +
            " - " +
            escapeHtml(match.away_score) +
            "</span>";
        }

        rows +=
          '<div class="match">' +

            '<div class="match-time">' +
              timeOrScore +
            "</div>" +

            '<div class="match-teams">' +

              '<div class="teams">' +
                escapeHtml(match.home) +
                " - " +
                escapeHtml(match.away) +
              "</div>" +

              '<div class="match-info">' +
                escapeHtml(
                  getStatusText(match)
                ) +
              "</div>" +

            "</div>" +

          "</div>";
      }

      return (
        '<div class="top-line">' +

          '<div class="category">' +
            "MONDIALI" +
          "</div>" +

          '<div class="live-dot"></div>' +

          '<div class="label">' +
            "PARTITE DI OGGI" +
          "</div>" +

        "</div>" +

        '<div class="matches-title">' +
          "Incontri in programma e risultati" +
        "</div>" +

        '<div class="matches-grid">' +
          rows +
        "</div>"
      );
    }


    function renderNews(article) {
      return (
        '<div class="top-line">' +

          '<div class="' +
            getCategoryClass(
              article.category
            ) +
          '">' +

            escapeHtml(
              article.category || "SPORT"
            ) +

          "</div>" +

          '<div class="live-dot"></div>' +

          '<div class="label">' +
            "ULTIME NOTIZIE" +
          "</div>" +

        "</div>" +

        '<div class="headline">' +
          escapeHtml(
            article.title ||
            "Notizia non disponibile"
          ) +
        "</div>" +

        '<div class="source">' +
          "Fonte: " +
          escapeHtml(
            article.source ||
            "Fonte non indicata"
          ) +
        "</div>"
      );
    }


    function renderMessage(article) {
      return (
        '<div class="top-line">' +

          '<div class="category">' +
            "MONDIALI" +
          "</div>" +

          '<div class="label">' +
            "AGGIORNAMENTO" +
          "</div>" +

        "</div>" +

        '<div class="headline">' +
          escapeHtml(
            article.title ||
            "Calendario non disponibile"
          ) +
        "</div>"
      );
    }


    function buildSlides(articles) {
      var matches = [];
      var messages = [];
      var news = [];
      var result = [];
      var i;

      for (i = 0; i < articles.length; i++) {
        var article = articles[i];

        if (
          article.category === "MONDIALI" &&
          article.type === "match"
        ) {
          matches.push(article);
        }

        if (
          article.category === "MONDIALI" &&
          article.type === "message"
        ) {
          messages.push(article);
        }

        if (
          article.type === "news" &&
          (
            article.category === "TENNIS" ||
            article.category === "PADEL"
          )
        ) {
          news.push(article);
        }
      }

      if (matches.length > 0) {
        result.push({
          type: "matches",
          matches: matches
        });
      } else if (messages.length > 0) {
        result.push({
          type: "message",
          article: messages[0]
        });
      }

      for (i = 0; i < news.length; i++) {
        result.push({
          type: "news",
          article: news[i]
        });
      }

      return result;
    }


    function showSlide() {
      if (slides.length === 0) {
        slideElement.innerHTML =
          '<div class="error-message">' +
          "Nessun contenuto disponibile" +
          "</div>";

        counterElement.innerHTML = "";
        return;
      }

      var selectedSlide =
        slides[currentSlide];

      slideElement.className =
        "slide slide-hidden";

      window.setTimeout(
        function() {
          if (
            selectedSlide.type ===
            "matches"
          ) {
            slideElement.innerHTML =
              renderMatches(
                selectedSlide.matches
              );
          }

          if (
            selectedSlide.type ===
            "news"
          ) {
            slideElement.innerHTML =
              renderNews(
                selectedSlide.article
              );
          }

          if (
            selectedSlide.type ===
            "message"
          ) {
            slideElement.innerHTML =
              renderMessage(
                selectedSlide.article
              );
          }

          counterElement.innerHTML =
            (currentSlide + 1) +
            " / " +
            slides.length;

          slideElement.className =
            "slide";

          restartProgress();

          currentSlide =
            currentSlide + 1;

          if (
            currentSlide >=
            slides.length
          ) {
            currentSlide = 0;
          }
        },
        350
      );
    }


    function formatUpdated(value) {
      if (!value) {
        return "";
      }

      var date = new Date(value);

      if (isNaN(date.getTime())) {
        return "";
      }

      return (
        "Aggiornato alle " +
        date.toLocaleTimeString(
          "it-IT",
          {
            hour: "2-digit",
            minute: "2-digit"
          }
        )
      );
    }


    function loadNews() {
      var url =
        "https://raw.githubusercontent.com/" +
        "provacanva908-commits/" +
        "meteo-mariano/main/news.json" +
        "?time=" +
        new Date().getTime();

      fetch(
        url,
        {
          cache: "no-store"
        }
      )
        .then(
          function(response) {
            if (!response.ok) {
              throw new Error(
                "Errore HTTP " +
                response.status
              );
            }

            return response.json();
          }
        )
        .then(
          function(data) {
            var articles =
              data.articles || [];

            slides =
              buildSlides(articles);

            currentSlide = 0;

            updatedElement.innerHTML =
              formatUpdated(
                data.updated_at
              );

            showSlide();

            if (slideTimer !== null) {
              window.clearInterval(
                slideTimer
              );
            }

            slideTimer =
              window.setInterval(
                showSlide,
                slideDuration
              );
          }
        )
        .catch(
          function(error) {
            console.log(
              "Errore caricamento:",
              error
            );

            slideElement.innerHTML =
              '<div class="error-message">' +
              "Notizie momentaneamente non disponibili" +
              "</div>";

            counterElement.innerHTML = "";
            updatedElement.innerHTML = "";
          }
        );
    }


    loadNews();

    window.setInterval(
      loadNews,
      15 * 60 * 1000
    );
  </script>

</body>
</html>
