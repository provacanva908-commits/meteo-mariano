<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #07182d;
      color: white;
    }

    body {
      background:
        radial-gradient(
          circle at 80% 50%,
          #164d78 0%,
          #07182d 55%,
          #030b15 100%
        );
    }

    .page {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: stretch;
      position: relative;
    }

    .brand {
      width: 220px;
      min-width: 220px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.28);
      border-right: 2px solid rgba(255,255,255,0.14);

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      text-align: center;
    }

    .brand img {
      display: block;
      max-width: 150px;
      max-height: 75px;
      object-fit: contain;
      margin-bottom: 7px;
    }

    .brand-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .brand-subtitle {
      margin-top: 4px;
      font-size: 11px;
      opacity: 0.8;
    }

    .news-area {
      flex: 1;
      min-width: 0;
      padding: 13px 22px;

      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .top-line {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .category {
      padding: 5px 12px;
      border-radius: 5px;
      background: #e31b23;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .live-label {
      font-size: 12px;
      opacity: 0.75;
    }

    .headline {
      max-width: 100%;
      font-size: clamp(21px, 2.1vw, 37px);
      font-weight: 800;
      line-height: 1.08;
      text-shadow: 0 2px 7px rgba(0,0,0,0.55);
    }

    .source {
      margin-top: 9px;
      font-size: 13px;
      opacity: 0.8;
    }

    .progress {
      position: absolute;
      left: 220px;
      right: 0;
      bottom: 0;
      height: 5px;
      background: rgba(255,255,255,0.15);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: #ffffff;
    }

    .progress-bar.animate {
      animation: progress 8s linear forwards;
    }

    @keyframes progress {
      from {
        width: 0%;
      }

      to {
        width: 100%;
      }
    }

    .error {
      font-size: 18px;
      text-align: center;
    }

    @media (max-width: 1000px) {
      .brand {
        width: 170px;
        min-width: 170px;
      }

      .brand img {
        max-width: 120px;
        max-height: 58px;
      }

      .brand-title {
        font-size: 14px;
      }

      .progress {
        left: 170px;
      }

      .news-area {
        padding: 9px 15px;
      }
    }
  </style>
</head>

<body>

  <main class="page">

    <aside class="brand">
      <img
        src="logo-mariano.png"
        alt="Mariano Sports Arena"
      >

      <div class="brand-title">
        SPORT NEWS
      </div>

      <div class="brand-subtitle">
        Calcio · Tennis · Padel
      </div>
    </aside>

    <section class="news-area">

      <div class="top-line">
        <div class="category" id="category">
          SPORT
        </div>

        <div class="live-label">
          ULTIME NOTIZIE
        </div>
      </div>

      <div class="headline" id="headline">
        Caricamento notizie...
      </div>

      <div class="source" id="source"></div>

    </section>

    <div class="progress">
      <div
        class="progress-bar"
        id="progress-bar"
      ></div>
    </div>

  </main>

  <script>
    const categoryElement =
      document.getElementById("category");

    const headlineElement =
      document.getElementById("headline");

    const sourceElement =
      document.getElementById("source");

    const progressBar =
      document.getElementById("progress-bar");

    let articles = [];
    let currentIndex = 0;

    function restartProgress() {
      progressBar.classList.remove("animate");

      void progressBar.offsetWidth;

      progressBar.classList.add("animate");
    }

    function showArticle() {
      if (!articles.length) {
        headlineElement.textContent =
          "Nessuna notizia disponibile";

        return;
      }

      const article = articles[currentIndex];

      categoryElement.textContent =
        article.category || "SPORT";

      headlineElement.textContent =
        article.title;

      sourceElement.textContent =
        "Fonte: " + article.source;

      restartProgress();

      currentIndex =
        (currentIndex + 1) % articles.length;
    }

    function loadNews() {
      fetch(
        "news.json?time=" + Date.now(),
        {
          cache: "no-store"
        }
      )
        .then(function(response) {
          if (!response.ok) {
            throw new Error(
              "Errore HTTP " + response.status
            );
          }

          return response.json();
        })
        .then(function(data) {
          if (
            !data.articles ||
            !data.articles.length
          ) {
            throw new Error(
              "Nessuna notizia trovata"
            );
          }

          articles = data.articles;
          currentIndex = 0;

          showArticle();
        })
        .catch(function(error) {
          console.error(error);

          headlineElement.innerHTML =
            '<div class="error">' +
            'Notizie momentaneamente non disponibili' +
            '</div>';
        });
    }

    loadNews();

    setInterval(showArticle, 8000);

    setInterval(loadNews, 30 * 60 * 1000);
  </script>

</body>
</html>
